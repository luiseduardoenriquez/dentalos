# ─────────────────────────────────────────────────────────────────────────────
# DentalOS — Nginx Reverse Proxy Configuration
#
# Install: sudo cp nginx/dentalos.conf /etc/nginx/sites-available/dentalos
#          sudo ln -sf /etc/nginx/sites-available/dentalos /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# SSL:     sudo certbot --nginx -d app.dentalos.co -d dentalos.co
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zone — 10 req/sec per IP for API endpoints.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.dentalos.co dentalos.co;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main server ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.dentalos.co dentalos.co;

    # ── TLS (managed by certbot) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.dentalos.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.dentalos.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # ── Upload limit (matches backend max: 25MB for documents) ───────────
    client_max_body_size 25m;

    # ── API proxy → FastAPI backend (port 8000) ──────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (WhatsApp chat, VoIP screen pop, notifications)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── Health check endpoint (no rate limit) ────────────────────────────
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend proxy → Next.js (port 3000) ─────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js HMR (dev) and potential future use
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static assets caching ────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Service worker (must not be cached aggressively) ─────────────────
    location /sw.js {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }

    location /serwist/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }

    # ── Deny access to hidden files ──────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
